<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Zip To Zip — Reports & Dashboards</title>
<link rel="icon" type="image/png" href="./assets/favicon.png">
<style>
  :root{
    --bg:#f1f5f9; --card:#ffffff; --border:#e2e8f0; --primary:#2563eb; --primary-light:#dbeafe;
    --text:#0f172a; --text-muted:#64748b; --success:#16a34a; --purple:#7c3aed; --teal:#0891b2;
    --warning:#d97706; --radius:12px; --shadow:0 1px 3px rgba(0,0,0,.08),0 1px 2px rgba(0,0,0,.04);
    --shadow-md:0 8px 24px rgba(0,0,0,.10);
  }
  *{box-sizing:border-box}
  body{margin:0;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
    background:var(--bg);color:var(--text);font-size:14px;line-height:1.5;-webkit-font-smoothing:antialiased}
  .wrap{max-width:1080px;margin:0 auto;padding:0 20px}

  header.site{background:var(--card);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:50}
  .site-inner{display:flex;align-items:center;justify-content:space-between;gap:16px;padding:14px 20px;max-width:1080px;margin:0 auto;flex-wrap:wrap}
  .brand{display:flex;align-items:center;gap:12px;text-decoration:none}
  .brand img{height:46px;width:auto;display:block}
  .brand .fallback{font-weight:800;font-size:20px;color:var(--text);letter-spacing:.2px}
  .badge{display:inline-flex;align-items:center;gap:6px;padding:4px 10px;border-radius:9999px;
    background:var(--primary-light);color:var(--primary);font-weight:600;font-size:12px}
  .badge.test{background:#fef3c7;color:#b45309}

  .hero{padding:40px 0 8px}
  .hero h1{font-size:26px;margin:0 0 6px;letter-spacing:-.3px}
  .hero p{margin:0;color:var(--text-muted);max-width:680px}

  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:18px;padding:28px 0 56px}
  .card{display:flex;flex-direction:column;background:var(--card);border:1px solid var(--border);
    border-radius:var(--radius);box-shadow:var(--shadow);text-decoration:none;color:inherit;overflow:hidden;
    transition:transform .14s ease,box-shadow .14s ease,border-color .14s ease}
  .card:hover{transform:translateY(-4px);box-shadow:var(--shadow-md);border-color:#cbd5e1}
  .card .top{display:flex;align-items:center;gap:12px;padding:18px 18px 8px}
  .card .icon{flex:none;width:46px;height:46px;border-radius:10px;display:grid;place-items:center;font-size:24px;
    background:var(--primary-light)}
  .card h3{margin:0;font-size:16px;font-weight:700}
  .card .tag{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--primary)}
  .card .desc{padding:4px 18px 16px;color:var(--text-muted);font-size:13.5px;flex:1}
  .card .foot{display:flex;align-items:center;justify-content:space-between;
    padding:12px 18px;border-top:1px solid var(--border);font-size:12px;color:var(--text-muted)}
  .card .view{color:var(--primary);font-weight:700}

  .empty{padding:40px;text-align:center;color:var(--text-muted);background:var(--card);
    border:1px dashed var(--border);border-radius:var(--radius)}

  footer.site{border-top:1px solid var(--border);color:var(--text-muted);font-size:12.5px;padding:22px 0;background:var(--card)}
  .foot-inner{display:flex;justify-content:space-between;gap:12px;flex-wrap:wrap;align-items:center}
</style>
</head>
<body>
<header class="site">
  <div class="site-inner">
    <a class="brand" href="./index.html" aria-label="Zip To Zip home">
      <img src="./assets/logo.png" alt="Zip To Zip" onerror="this.style.display='none';this.nextElementSibling.style.display='inline'">
      <span class="fallback" style="display:none">Zip&nbsp;To&nbsp;Zip</span>
    </a>
    <span class="badge test">● Test environment</span>
  </div>
</header>

<div class="wrap">
  <section class="hero">
    <h1>Reports &amp; Dashboards</h1>
    <p>A live preview of the kind of reporting and dashboards we want to build. Select any report below to open it.</p>
  </section>

  <main id="grid" class="grid" aria-label="Available reports"></main>
</div>

<footer class="site">
  <div class="wrap foot-inner">
    <span>Zip&nbsp;To&nbsp;Zip · Reports preview</span>
    <span id="count"></span>
  </div>
</footer>

<script>
  // === Report catalog — add one entry per HTML report ===
  const REPORTS = [
    {
      file: "booking_dashboard_live.html",
      title: "Booking Dashboard",
      tag: "Dashboard",
      icon: "📦",
      desc: "Live booking metrics — jobs by move date, local vs long-distance, sales rep & source breakdowns, plus data-quality flags for missing info and high-risk notes.",
      meta: "Interactive · Chart.js"
    }
  ];

  const grid = document.getElementById('grid');
  if(!REPORTS.length){
    grid.innerHTML = '<div class="empty">No reports yet. Add HTML files and they will appear here.</div>';
  } else {
    grid.innerHTML = REPORTS.map(r => `
      <a class="card" href="./${r.file}">
        <div class="top">
          <div class="icon">${r.icon || '📄'}</div>
          <div>
            <div class="tag">${r.tag || 'Report'}</div>
            <h3>${r.title}</h3>
          </div>
        </div>
        <div class="desc">${r.desc || ''}</div>
        <div class="foot"><span>${r.meta || ''}</span><span class="view">View →</span></div>
      </a>`).join('');
  }
  document.getElementById('count').textContent =
    REPORTS.length + (REPORTS.length === 1 ? ' report' : ' reports');
</script>
</body>
</html>
